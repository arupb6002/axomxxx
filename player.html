<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="AXOM XXX - Premium Player">
    <meta property="og:description" content="Premium video player for AXOM XXX">
    <meta property="og:image" content="https://axomxxx.vercel.app/og-image.jpg">
    <meta property="og:url" content="https://axomxxx.vercel.app/player.html">
    <meta property="og:type" content="video.other">
    <meta name="description" content="AXOM XXX - Premium video player. Watch exclusive Assamese premium content in HD with advanced controls.">
    <meta name="keywords" content="axom xxx video player, assamese premium video, axom player, hd video player">
    <meta name="robots" content="index, follow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AXOM XXX - Premium Video Player | HD Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ededed;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* premium header */
        .header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 24px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 30%, #e0a800 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 0.8px;
            color: #b0b0b0;
            margin-top: 4px;
        }

        /* main video player container */
        .player-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #videoPlayer {
            width: 100%;
            display: block;
            background: #000;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            cursor: pointer;
        }

        /* fullscreen mode */
        #videoPlayer:fullscreen {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        .video-container:fullscreen {
            max-width: none;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* premium controls overlay */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-container.show-controls .controls {
            opacity: 1;
            pointer-events: auto;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .progress {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress div {
            width: 0%;
            height: 100%;
            background: #c0392b;
            border-radius: 20px;
        }

        .time-info {
            color: white;
            font-size: 13px;
            font-weight: 500;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 30px;
            letter-spacing: 0.5px;
            font-family: monospace;
        }

        /* double tap feedback toast */
        .seek-toast {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            color: #ffcc00;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            z-index: 300;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            border: 1px solid rgba(255,200,0,0.3);
            font-family: monospace;
        }

        /* back button + info */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            margin-bottom: 12px;
            border-radius: 60px;
        }

        .back-home-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .back-home-btn:hover {
            background: #c0392b;
            transform: scale(1.02);
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 40px;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .join-channel {
            background: linear-gradient(95deg, #c0392b, #e67e22);
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .join-channel:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 12px rgba(192,57,43,0.4);
        }

        .footer {
            text-align: center;
            padding: 28px 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 30px;
        }

        @media (max-width: 700px) {
            .controls {
                padding: 12px 16px;
                gap: 10px;
            }
            .control-btn {
                width: 38px;
                height: 38px;
                font-size: 14px;
            }
            .time-info {
                font-size: 11px;
            }
            .video-title {
                max-width: 45%;
                font-size: 12px;
            }
            .back-home-btn {
                padding: 6px 14px;
                font-size: 12px;
            }
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">AXOM XXX</div>
    <div class="subtitle">PREMIUM HD PLAYER | SIVASAGAR</div>
</div>

<div class="player-wrapper">
    <div class="nav-bar">
        <button class="back-home-btn" id="backToHomeBtn">
            <i class="fas fa-arrow-left"></i> Home
        </button>
        <div class="video-title" id="videoTitleDisplay">Loading video...</div>
        <a href="#" class="join-channel" id="joinChannelBtn">
            <i class="fab fa-telegram-plane"></i> Join
        </a>
    </div>

    <div class="video-container" id="videoContainer">
        <video id="videoPlayer" playsinline webkit-playsinline preload="metadata"></video>
        <div class="controls">
            <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <div class="progress" id="progressWrapper">
                <div id="progressBar"></div>
            </div>
            <div class="time-info" id="timeDisplay">0:00 / 0:00</div>
            <button class="control-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
        </div>
    </div>
</div>

<div class="seek-toast" id="seekToast">⏪ -10 sec</div>

<div class="footer">
    <i class="far fa-copyright"></i> 2026 AXOM XXX — Premium Streaming<br>
    Made With ❤️ in Sivasagar | Joi Aai Axom
</div>

<script>
    /* ---------------------------------------------------------
       PLAYER PAGE - standalone with double tap (±10 sec)
       Gets video info from URL parameters
    --------------------------------------------------------- */
    
    // DOM elements
    const videoPlayer = document.getElementById("videoPlayer");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const progressBarFill = document.getElementById("progressBar");
    const progressWrapper = document.getElementById("progressWrapper");
    const videoContainer = document.getElementById("videoContainer");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const backBtn = document.getElementById("backToHomeBtn");
    const joinBtn = document.getElementById("joinChannelBtn");
    const videoTitleSpan = document.getElementById("videoTitleDisplay");
    const timeDisplaySpan = document.getElementById("timeDisplay");
    const seekToast = document.getElementById("seekToast");

    // get video data from URL params
    const urlParams = new URLSearchParams(window.location.search);
    let videoSrc = urlParams.get("src");
    let videoTitle = urlParams.get("title") || "AXOM XXX Exclusive";

    if (!videoSrc) {
        // fallback demo or error message
        videoTitle = "Sample - Premium Content";
        videoSrc = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4";
        // show error softly? but still functional
        console.warn("No video src provided, using demo.");
    }

    // decode URL-encoded title and src
    videoSrc = decodeURIComponent(videoSrc);
    videoTitle = decodeURIComponent(videoTitle);
    videoTitleSpan.textContent = videoTitle;
    document.title = `${videoTitle} | AXOM XXX Player`;

    // load video
    videoPlayer.src = videoSrc;
    videoPlayer.load();
    
    // auto play attempt
    videoPlayer.play().catch(e => console.log("autoplay blocked, user interaction needed"));

    // update play button
    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';

    // ========== DOUBLE TAP SEEK LOGIC (±10 sec) ==========
    let lastTap = 0;
    let tapTimeout = null;

    function showSeekToast(seconds, direction) {
        seekToast.style.opacity = "1";
        if (direction === 'back') {
            seekToast.innerHTML = `<i class="fas fa-backward"></i> -${seconds} sec`;
        } else {
            seekToast.innerHTML = `<i class="fas fa-forward"></i> +${seconds} sec`;
        }
        setTimeout(() => {
            seekToast.style.opacity = "0";
        }, 800);
    }

    videoPlayer.addEventListener("click", (e) => {
        // prevent conflict with controls
        const rect = videoPlayer.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const videoWidth = rect.width;
        const currentTimeNow = Date.now();
        const tapGap = currentTimeNow - lastTap;
        
        if (tapGap < 300 && tapGap > 30) {  // double tap detected
            e.stopPropagation();
            // Determine left side (< 40% width) or right side (> 60% width)
            const isLeftSide = clickX < videoWidth * 0.4;
            const isRightSide = clickX > videoWidth * 0.6;
            
            if (isLeftSide) {
                // seek backward 10 seconds
                let newTime = videoPlayer.currentTime - 10;
                if (newTime < 0) newTime = 0;
                videoPlayer.currentTime = newTime;
                showSeekToast(10, 'back');
            } 
            else if (isRightSide) {
                // seek forward 10 seconds
                let newTime = videoPlayer.currentTime + 10;
                if (videoPlayer.duration && newTime > videoPlayer.duration) newTime = videoPlayer.duration;
                videoPlayer.currentTime = newTime;
                showSeekToast(10, 'forward');
            }
            // if middle zone, ignore double tap seeking (to not interrupt)
            lastTap = 0;
            clearTimeout(tapTimeout);
            return;
        }
        
        lastTap = currentTimeNow;
        clearTimeout(tapTimeout);
        tapTimeout = setTimeout(() => {
            lastTap = 0;
        }, 300);
        
        // just normal click to show controls (no seek)
        showControlsTemporarily();
    });
    
    // also prevent propagation from container to avoid double interference
    videoContainer.addEventListener("click", (e) => {
        // if click is on video player itself? handled inside videoPlayer click
        if (e.target === videoPlayer) return;
        showControlsTemporarily();
    });

    // ========== CONTROLS & PROGRESS ==========
    let controlsTimeout;

    function showControlsTemporarily() {
        videoContainer.classList.add("show-controls");
        if (controlsTimeout) clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            if (!document.fullscreenElement) {
                videoContainer.classList.remove("show-controls");
            } else {
                setTimeout(() => {
                    if (!videoContainer.matches(':hover') && document.fullscreenElement) {
                        videoContainer.classList.remove("show-controls");
                    }
                }, 2000);
            }
        }, 2800);
    }

    videoContainer.addEventListener("mousemove", showControlsTemporarily);
    videoContainer.addEventListener("touchstart", showControlsTemporarily);

    // play/pause
    playPauseBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (videoPlayer.paused) {
            videoPlayer.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            videoPlayer.pause();
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
        showControlsTemporarily();
    });

    // update progress bar + time display
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        if (hrs > 0) {
            return `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        return `${mins}:${secs.toString().padStart(2,'0')}`;
    }

    videoPlayer.addEventListener("timeupdate", () => {
        if (videoPlayer.duration && isFinite(videoPlayer.duration)) {
            const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            progressBarFill.style.width = percent + "%";
            const currentFormatted = formatTime(videoPlayer.currentTime);
            const durationFormatted = formatTime(videoPlayer.duration);
            timeDisplaySpan.textContent = `${currentFormatted} / ${durationFormatted}`;
        } else {
            timeDisplaySpan.textContent = `0:00 / live`;
        }
    });

    videoPlayer.addEventListener("ended", () => {
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        showControlsTemporarily();
    });

    // seeking via progress bar
    if (progressWrapper) {
        progressWrapper.addEventListener("click", (e) => {
            const rect = progressWrapper.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const seekPercent = clickX / width;
            if (videoPlayer.duration) {
                videoPlayer.currentTime = seekPercent * videoPlayer.duration;
            }
            showControlsTemporarily();
        });
    }

    // fullscreen handling
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen().catch(err => console.warn(err));
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    function updateFullscreenIcon() {
        if (document.fullscreenElement) {
            fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
        } else {
            fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
        }
        showControlsTemporarily();
    }

    fullscreenBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleFullscreen();
        showControlsTemporarily();
    });

    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

    // back button: redirect to index.html (homepage)
    backBtn.addEventListener("click", () => {
        if (document.fullscreenElement) document.exitFullscreen();
        window.location.href = "index.html";
    });

    // join channel popup
    joinBtn.addEventListener("click", (e) => {
        e.preventDefault();
        alert("✨ Join AXOM XXX Premium Channel\nTelegram: @axomxxx_official\nWhatsApp: +91 70000 00000 (Coming Soon)");
    });

    // extra: handle video load start / show loading if needed
    let loadingIndicator = null;
    function removeLoading() {
        if (loadingIndicator && loadingIndicator.remove) loadingIndicator.remove();
    }
    videoPlayer.addEventListener("loadstart", () => {
        if (!loadingIndicator) {
            loadingIndicator = document.createElement("div");
            loadingIndicator.className = "loading-overlay";
            loadingIndicator.innerHTML = '<i class="fas fa-spinner fa-pulse" style="font-size:32px; color:#c0392b;"></i>';
            videoContainer.style.position = "relative";
            videoContainer.appendChild(loadingIndicator);
        }
    });
    videoPlayer.addEventListener("canplay", () => {
        removeLoading();
    });
    videoPlayer.addEventListener("error", () => {
        removeLoading();
        alert("Video failed to load. Please check the source or try again later.");
    });

    // initial control show
    setTimeout(() => {
        showControlsTemporarily();
    }, 500);
    
    // store the current time in localStorage? optional resume? but we keep clean.
    window.addEventListener("beforeunload", () => {
        // optional nothing
    });
    
    // add volume mute/unmute via keyboard? extra: but not necessary.
    console.log("Player ready — double tap left/right to seek ±10s");
</script>
</body>
</html>
